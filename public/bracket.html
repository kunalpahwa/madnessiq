const ROUND_NAMES = {R64:"Round of 64",R32:"Round of 32",S16:"Sweet 16",E8:"Elite Eight"};
const REGION_COLORS = {EAST:"#5090ff",WEST:"#ff7855",SOUTH:"#60ff90",MIDWEST:"#ffe050"};

const F4_MATCHUP = [["EAST","SOUTH"],["WEST","MIDWEST"]];

function getMatchupTeams(region, round, matchIdx, picks) {
  if (round === "R64") { const t = TEAMS[region]; const i = matchIdx*2; return [t[i], t[i+1]]; }
  const prev = ROUNDS[ROUNDS.indexOf(round)-1];
  const a = picks[`${region}-${prev}-${matchIdx*2}`], b = picks[`${region}-${prev}-${matchIdx*2+1}`];
  const fs = (n) => { const t = TEAMS[region].find(x=>x.t===n); return t?t.s:"?"; };
  return [a?{s:fs(a),t:a}:null, b?{s:fs(b),t:b}:null];
}
function getF4Teams(si, picks) {
  const [r1,r2] = F4_MATCHUP[si];
  const a=picks[`${r1}-E8-0`], b=picks[`${r2}-E8-0`];
  const fs=(n,r)=>{const t=TEAMS[r].find(x=>x.t===n);return t?t.s:"?";};
  return [a?{s:fs(a,r1),t:a,region:r1}:null, b?{s:fs(b,r2),t:b,region:r2}:null];
}
function getChampTeams(picks) {
  const a=picks["F4-0"],b=picks["F4-1"];
  const fi=(n)=>{for(const r of REGIONS){const t=TEAMS[r].find(x=>x.t===n);if(t)return{s:t.s,t:n,region:r};}return{s:"?",t:n};};
  return [a?fi(a):null, b?fi(b):null];
}
function clearDownstream(picks, region, round, matchIdx) {
  const np={...picks}; const ri=ROUNDS.indexOf(round); let mi=matchIdx;
  for(let r=ri+1;r<ROUNDS.length;r++){mi=Math.floor(mi/2);delete np[`${region}-${ROUNDS[r]}-${mi}`];}
  if(round==="E8"||ri<ROUNDS.indexOf("E8")){const fi=F4_MATCHUP.findIndex(p=>p.includes(region));if(fi>=0){delete np[`F4-${fi}`];delete np["CHAMP"];delete np["champScore1"];delete np["champScore2"];}}
  return np;
}
function countPicks(p){return Object.keys(p).filter(k=>!k.startsWith("champScore")&&p[k]).length;}
function isBracketComplete(p){return countPicks(p)===63&&p.champScore1&&p.champScore2;}

// ── SCORING ──────────────────────────────────────────────
const SCORE_ROUNDS = ["R64","R32","S16","E8","F4","CHAMP"];
const SCORE_ROUND_NAMES = {R64:"R64",R32:"R32",S16:"S16",E8:"E8",F4:"F4",CHAMP:"Final"};
const BASE_PTS = {R64:1,R32:2,S16:4,E8:8,F4:16,CHAMP:32};
const SEED_MAP = {};
Object.entries(TEAMS).forEach(([r,ts])=>ts.forEach(t=>{SEED_MAP[t.t]=t.s;}));

function pickKeyToRound(key){
  if(key==="CHAMP")return"CHAMP";if(key.startsWith("F4-"))return"F4";
  const p=key.split("-");return p.length===3?p[1]:null;
}
function pickKeyToResultId(key){
  if(key==="CHAMP")return"CHAMP";if(key.startsWith("F4-"))return key.replace("-","");
  const p=key.split("-");if(p.length===3){const r=p[0][0],rd=p[1],i=p[2];
    if(rd==="R64")return r+i;if(rd==="R32")return r+"R"+i;if(rd==="S16")return r+"S"+i;if(rd==="E8")return r+"E";}
  return null;
}
function getUpsetBonus(ws,ls){if(ws<=ls)return 0;return Math.max(0,ws-ls-2);}
function scoreBracket(picks,rm){
  let total=0,base=0,bonus=0,correct=0,wrong=0,pending=0;
  const byRound={};SCORE_ROUNDS.forEach(r=>{byRound[r]={pts:0,correct:0,wrong:0,pending:0,bonus:0,picks:[]};});
  Object.entries(picks).forEach(([key,team])=>{
    if(key.startsWith("champScore")||!team)return;
    const round=pickKeyToRound(key);if(!round||!byRound[round])return;
    const rid=pickKeyToResultId(key);const result=rid?rm[rid]:null;
    if(!result){pending++;byRound[round].pending++;byRound[round].picks.push({team,status:"pending",pts:0,bonus:0,round});return;}
    const isCorrect=team===result.winner;
    if(!isCorrect){wrong++;byRound[round].wrong++;byRound[round].picks.push({team,status:"wrong",pts:0,bonus:0,round});return;}
    const bp=BASE_PTS[round]||0;const ws=result.winner===result.team1?result.seed1:result.seed2;
    const ls=result.winner===result.team1?result.seed2:result.seed1;const ub=getUpsetBonus(ws,ls);
    total+=bp+ub;base+=bp;bonus+=ub;correct++;byRound[round].pts+=bp+ub;byRound[round].bonus+=ub;byRound[round].correct++;
    byRound[round].picks.push({team,status:"correct",pts:bp+ub,bonus:ub,round});
  });
  return{total,base,bonus,correct,wrong,pending,byRound};
}
function getEliminatedTeams(rm){const e=new Set();Object.values(rm).forEach(r=>{if(r.winner){const l=r.winner===r.team1?r.team2:r.team1;e.add(l);}});return e;}
function calcMaxPossible(picks,score,rm){
  const elim=getEliminatedTeams(rm);let max=score.total;
  Object.values(score.byRound).forEach(rd=>{rd.picks.filter(p=>p.status==="pending").forEach(p=>{
    if(!elim.has(p.team)){max+=BASE_PTS[p.round]||0;const s=SEED_MAP[p.team]||8;if(s>=8)max+=Math.max(0,s-4);}
  });});return max;
}

function TeamSlot({team,isPicked,onClick,disabled,regionColor}) {
  if(!team) return (<div style={{height:36,background:"#283040",border:"1px dashed #b0c0d8",borderRadius:6,display:"flex",alignItems:"center",padding:"0 10px",fontFamily:"'DM Mono',monospace",fontSize:9,color:"#a8b0c8"}}>{"— waiting —"}</div>);

    <span style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:"#d0d8e8",minWidth:16}}>{team.s}</span>
    <span style={{fontSize:12,fontWeight:isPicked?700:400,color:isPicked?"#60ff90":"#faf6f0",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{team.t}</span>
    {isPicked && <span style={{marginLeft:"auto",fontSize:12,color:"#70ffc0"}}>{"\u2713"}</span>}
  </div>);
}
function Matchup({teams,pickKey,picks,onPick,disabled,regionColor,matchNum}) {
  const [t1,t2]=teams; const cur=picks[pickKey];
  return (<div style={{marginBottom:8,paddingBottom:2,borderBottom:"1px solid #8898b0",animation:`slideUp 0.2s ease ${matchNum*0.03}s both`}}><div style={{display:"flex",flexDirection:"column",gap:2}}>
    <TeamSlot team={t1} isPicked={cur===t1?.t} onClick={()=>t1&&onPick(pickKey,t1.t)} disabled={disabled||!t1} regionColor={regionColor}/>
    <TeamSlot team={t2} isPicked={cur===t2?.t} onClick={()=>t2&&onPick(pickKey,t2.t)} disabled={disabled||!t2} regionColor={regionColor}/>
  </div></div>);
}

function BracketApp() {

  const [newName,setNewName]=useState("");
  const [confirmDelete,setConfirmDelete]=useState(null);
  const [resultsMap,setResultsMap]=useState({});
  const saveTimer=useRef(null);
  const active=brackets[activeIdx]||null;
  const picks=active?.picks||{};
  const locked=active?.locked||false;

  const joinRoom = async () => {
    const code=roomCode.trim().toUpperCase();
    if(!code) return;
    localStorage.setItem("miq_room",code);
    setRoomCode(code); setLoading(true);

    // Migrate old localStorage brackets to Supabase
    try {
      const oldBrackets = JSON.parse(localStorage.getItem("miq_brackets") || "[]");
      if (oldBrackets.length > 0) {
        for (const ob of oldBrackets) {
          if (!ob.name || !ob.picks || Object.keys(ob.picks).length === 0) continue;
          const {data: existing} = await sb.from("brackets").select("id").eq("room_code", code).eq("name", ob.name).single();
          if (!existing) {
            await sb.from("brackets").insert({
              room_code: code, name: ob.name, picks: ob.picks,
              locked: ob.locked || false, locked_at: ob.lockedAt || null
            });
          }
        }
        localStorage.removeItem("miq_brackets");
      }
    } catch(e) { console.log("Migration:", e); }

    const [{data},{data:rData}]=await Promise.all([
      sb.from("brackets").select("*").eq("room_code",code).order("created_at"),
      sb.from("results").select("*"),
    ]);
    const all=(data||[]).map(r=>({id:r.id,name:r.name,picks:r.picks||{},locked:r.locked,lockedAt:r.locked_at,created:r.created_at}));
    if(rData){const rm={};rData.forEach(r=>{rm[r.id]=r;});setResultsMap(rm);}
    setBrackets(all);
    setActiveIdx(all.length > 0 ? 0 : 0);
    setLoading(false); setScreen("bracket");
  };

  const createBracket = async () => {
    const name = newName.trim();
    if (!name || !roomCode) return;
    const exists = brackets.find(b => b.name === name);
    if (exists) { alert("That name is already taken in this room."); return; }
    const {data:nr} = await sb.from("brackets").insert({room_code:roomCode,name,picks:{},locked:false}).select().single();
    if (nr) {
      const newB = {id:nr.id,name:nr.name,picks:nr.picks||{},locked:nr.locked,lockedAt:nr.locked_at,created:nr.created_at};
      setBrackets(prev => [...prev, newB]);
      setActiveIdx(brackets.length);
    }
    setNewName(""); setShowCreate(false);
  };

  const deleteBracket = async (idx) => {
    const b = brackets[idx];
    if (!b || b.locked) return;
    await sb.from("brackets").delete().eq("id", b.id);
    setBrackets(prev => prev.filter((_,i) => i !== idx));
    if (activeIdx >= idx && activeIdx > 0) setActiveIdx(activeIdx - 1);
    else if (brackets.length <= 1) setActiveIdx(0);
    setConfirmDelete(null);
  };

  useEffect(()=>{
    if(screen!=="bracket"||!roomCode) return;
    const ch=sb.channel("room-"+roomCode).on("postgres_changes",{event:"*",schema:"public",table:"brackets",filter:`room_code=eq.${roomCode}`},(payload)=>{
      if(payload.eventType==="INSERT"){setBrackets(prev=>{if(prev.find(b=>b.id===payload.new.id))return prev;return[...prev,{id:payload.new.id,name:payload.new.name,picks:payload.new.picks||{},locked:payload.new.locked,lockedAt:payload.new.locked_at,created:payload.new.created_at}];});}
      else if(payload.eventType==="UPDATE"){setBrackets(prev=>prev.map(b=>b.id===payload.new.id?{...b,picks:payload.new.picks||{},locked:payload.new.locked,lockedAt:payload.new.locked_at}:b));}
    }).subscribe();
    return ()=>{sb.removeChannel(ch);};
  },[screen,roomCode]);

  const savePicks=useCallback((bracket)=>{
    if(!bracket?.id||bracket.locked)return;
    if(saveTimer.current)clearTimeout(saveTimer.current);
    setSaving(true);
    saveTimer.current=setTimeout(async()=>{
      await sb.from("brackets").update({picks:bracket.picks,updated_at:new Date().toISOString()}).eq("id",bracket.id);
      setSaving(false);

    setBrackets(prev=>{
      const up=[...prev]; const br={...up[activeIdx]}; let np={...br.picks};
      if(np[key]&&np[key]!==team){const parts=key.split("-");if(parts.length===3)np=clearDownstream(np,parts[0],parts[1],parseInt(parts[2]));else if(key.startsWith("F4-")){delete np["CHAMP"];delete np["champScore1"];delete np["champScore2"];}}
      np[key]=team; br.picks=np; up[activeIdx]=br; savePicks(br); return up;
    });
  },[activeIdx,locked,savePicks]);

  const lockBracket=async()=>{
    if(!active?.id)return; const now=new Date().toISOString();
    await sb.from("brackets").update({locked:true,locked_at:now}).eq("id",active.id);
    setBrackets(prev=>prev.map((b,i)=>i===activeIdx?{...b,locked:true,lockedAt:now}:b));
    setConfirmLock(false);
  };

  const totalPicks=active?countPicks(picks):0;

  if(screen==="join") return (

      <div style={{textAlign:"center",marginBottom:30}}>
        <h1 style={{fontSize:24,fontWeight:700,margin:"0 0 4px"}}><span style={{color:"#ffa070"}}>Madness</span><span>IQ</span></h1>
        <div style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:"#e0e8f4",letterSpacing:2}}>BRACKET CHALLENGE</div>
      </div>

        <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,letterSpacing:2,color:"#ffb888",marginBottom:16}}>ENTER ROOM CODE</div>
        <div style={{fontSize:12,color:"#f0f2fa",marginBottom:16,lineHeight:1.6}}>Everyone in your family enters the same code to see all brackets in one place.</div>
        <div style={{marginBottom:18}}>
          <input value={roomCode} onChange={e=>setRoomCode(e.target.value.toUpperCase())} onKeyDown={e=>e.key==="Enter"&&joinRoom()} placeholder="e.g. PAHWA" maxLength={20} style={{width:"100%",background:"#222a38",border:"1px solid #a8b0c8",borderRadius:6,padding:"12px",color:"#ffa070",fontSize:22,fontFamily:"'DM Mono',monospace",fontWeight:700,letterSpacing:4,textTransform:"uppercase",textAlign:"center"}}/>
        </div>
        <button onClick={joinRoom} disabled={!roomCode.trim()||loading} style={{width:"100%",background:roomCode.trim()?"linear-gradient(135deg,#ff9050,#ff6840)":"#242838",border:"none",borderRadius:8,padding:"12px",color:"#fff",cursor:roomCode.trim()?"pointer":"default",fontFamily:"'DM Mono',monospace",fontSize:12,fontWeight:700,letterSpacing:1}}>{loading?"JOINING...":"ENTER ROOM \u2192"}</button>
      </div>
      <a href="/" style={{display:"block",textAlign:"center",marginTop:16,fontFamily:"'DM Mono',monospace",fontSize:8,color:"#ffa070",textDecoration:"none"}}>{"\u2190"} BACK TO MADNESSIQ</a>
    </div>
  );

  return (
    <div style={{maxWidth:520,margin:"0 auto",minHeight:"100vh"}}>
      <div style={{background:"linear-gradient(180deg,#283040,#08090c)",borderBottom:"1px solid #98a0b8",padding:"12px 16px 8px",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <a href="/" style={{textDecoration:"none"}}><h1 style={{fontSize:17,fontWeight:700,margin:0}}><span style={{color:"#ffa070"}}>Madness</span><span style={{color:"#f2ede5"}}>IQ</span><span style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:"#e0e8f4",marginLeft:6}}>BRACKET</span></h1></a>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontFamily:"'DM Mono',monospace",fontSize:8,color:"#ffb888",background:"#48282e",padding:"2px 8px",borderRadius:4,border:"1px solid #b0a080"}}>{roomCode}</span>
            {saving && <span style={{fontFamily:"'DM Mono',monospace",fontSize:7,color:"#edaa3d",animation:"pulse 1s infinite"}}>saving...</span>}
          </div>
        </div>
        <div style={{display:"flex",gap:4,marginTop:8,alignItems:"center",overflowX:"auto"}}>
          {brackets.map((b,i)=>(<button key={b.id||i} onClick={()=>{setActiveIdx(i);setConfirmDelete(null);}} style={{background:activeIdx===i?"#384258":"transparent",border:activeIdx===i?"1px solid #b8c8d8":"1px solid #98a0b8",color:activeIdx===i?"#faf6f0":"#b0b8c8",padding:"4px 10px",borderRadius:4,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"'DM Mono',monospace",fontSize:9}}>{b.name} {b.locked?"\uD83D\uDD12":""}</button>))}
          <button onClick={()=>setShowCreate(true)} style={{background:"transparent",border:"1px dashed #b0c0d0",color:"#ffa070",padding:"4px 10px",borderRadius:4,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"'DM Mono',monospace",fontSize:9}}>+ NEW</button>
        </div>
      </div>
      <div style={{padding:"12px 16px 80px"}}>
        {/* Create bracket form */}
        {showCreate && (
          <div style={{background:"linear-gradient(135deg,#1a1e2a,#1e1822)",border:"1px solid #b0aac8",borderRadius:8,padding:"16px",marginBottom:10,animation:"slideUp 0.2s ease"}}>

          </div>
        )}

        {/* No brackets yet */}
        {brackets.length === 0 && !showCreate && (
          <div style={{textAlign:"center",padding:"40px 20px"}}>
            <div style={{fontSize:14,color:"#d0d8e8",marginBottom:12}}>No brackets in this room yet.</div>
            <button onClick={()=>setShowCreate(true)} style={{background:"linear-gradient(135deg,#ff9050,#ff6840)",border:"none",borderRadius:8,padding:"12px 24px",color:"#fff",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:11,fontWeight:700,letterSpacing:1}}>CREATE FIRST BRACKET</button>
          </div>
        )}

        {active && (<>
          {/* Delete button for unlocked brackets */}
          {!locked && confirmDelete !== activeIdx && (
            <div style={{display:"flex",justifyContent:"flex-end",marginBottom:6}}>
              <button onClick={()=>setConfirmDelete(activeIdx)} style={{background:"transparent",border:"1px solid #a08888",borderRadius:4,padding:"3px 8px",color:"#907068",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:7,letterSpacing:1}}>DELETE THIS BRACKET</button>
            </div>
          )}
          {confirmDelete === activeIdx && (
            <div style={{background:"#48282e",border:"1px solid #b08088",borderRadius:6,padding:"10px",marginBottom:8,textAlign:"center"}}>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:"#ff8888",marginBottom:6}}>Delete {active.name}'s bracket? This can't be undone.</div>
              <div style={{display:"flex",gap:6,justifyContent:"center"}}>
                <button onClick={()=>setConfirmDelete(null)} style={{background:"#242838",border:"1px solid #b8c8d8",borderRadius:4,padding:"6px 14px",color:"#f2ede5",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:9}}>CANCEL</button>
                <button onClick={()=>deleteBracket(activeIdx)} style={{background:"linear-gradient(135deg,#ed3d3d,#cd2a2a)",border:"none",borderRadius:4,padding:"6px 14px",color:"#fff",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:9,fontWeight:700}}>DELETE</button>
              </div>
            </div>
          )}
          <div style={{background:"#161a24",borderRadius:8,padding:"10px 12px",marginBottom:10,border:"1px solid #98a0b8"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <span style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:"#faf6ee"}}>{active.name}'s Bracket {locked&&"\uD83D\uDD12 LOCKED"}</span>
              <span style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:complete?"#60ff90":"#ff9050"}}>{totalPicks}/63 picks</span>
            </div>
            <div style={{height:5,background:"#78809a",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",background:complete?"#60ff90":"linear-gradient(90deg,#ff9050,#ff6840)",width:`${(totalPicks/63)*100}%`,borderRadius:2,transition:"width 0.3s ease"}}/></div>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:6}}>{REGIONS.map(r=>(<span key={r} style={{fontFamily:"'DM Mono',monospace",fontSize:8,color:REGION_COLORS[r]}}>{r}: {regionPicks(r)}/15</span>))}</div>
          </div>
          <div style={{display:"flex",gap:2,marginBottom:8}}>{[...REGIONS,"FINAL4","SCORES"].map(r=>(<button key={r} onClick={()=>setRegion(r)} style={{flex:1,background:region===r?"#384258":"transparent",borderBottom:region===r?`3px solid ${r==="SCORES"?"#ffe050":r==="FINAL4"?"#ffa070":REGION_COLORS[r]}`:"2px solid transparent",border:"none",borderTop:"none",borderLeft:"none",borderRight:"none",color:region===r?"#faf6f0":"#b0b8c8",padding:"6px 2px 4px",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:r==="FINAL4"||r==="SCORES"?8:9,letterSpacing:1}}>{r==="FINAL4"?"FINAL 4":r==="SCORES"?"\uD83C\uDFC6 SCORES":r}</button>))}</div>

          {REGIONS.includes(region) && (<div>
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:"#e8ecf4",marginBottom:8,textAlign:"center"}}>{REGION_SITES[region]} Regional</div>
            {ROUNDS.map((round,rIdx)=>{const num=8/Math.pow(2,rIdx);return(<div key={round} style={{marginBottom:14,padding:"10px",background:"#242c3a",borderRadius:8,border:"1px solid #98a0b8"}}>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:10,letterSpacing:2,fontWeight:700,color:REGION_COLORS[region],marginBottom:6}}>{ROUND_NAMES[round]}</div>
              {Array.from({length:num},(_,i)=>{const key=`${region}-${round}-${i}`;const teams=getMatchupTeams(region,round,i,picks);return <Matchup key={key} teams={teams} pickKey={key} picks={picks} onPick={makePick} disabled={locked} regionColor={REGION_COLORS[region]} matchNum={i}/>;})}
            </div>);})}
            {picks[`${region}-E8-0`]&&(<div style={{background:"linear-gradient(135deg,#1a1e2a,#1e1822)",border:`1px solid ${REGION_COLORS[region]}aa`,borderRadius:8,padding:"12px",textAlign:"center",animation:"slideUp 0.3s ease"}}><div style={{fontFamily:"'DM Mono',monospace",fontSize:7,letterSpacing:2,color:REGION_COLORS[region]}}>{region} CHAMPION</div><div style={{fontSize:20,fontWeight:700,marginTop:4,color:"#fffcf4"}}>{picks[`${region}-E8-0`]}</div><div style={{fontFamily:"'DM Mono',monospace",fontSize:8,color:"#d0d8e8",marginTop:2}}>{"\u2192"} FINAL FOUR</div></div>)}
          </div>)}

          {region==="FINAL4"&&(<div>
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,letterSpacing:2,color:"#ffb888",marginBottom:8,textAlign:"center"}}>FINAL FOUR {"\u2014"} INDIANAPOLIS {"\u2014"} SAT APR 4</div>
            {[0,1].map(si=>{const [r1,r2]=F4_MATCHUP[si];const teams=getF4Teams(si,picks);return(<div key={si} style={{marginBottom:12}}><div style={{fontFamily:"'DM Mono',monospace",fontSize:8,color:"#e0e8f4",marginBottom:4}}>SEMIFINAL {si+1}: <span style={{color:REGION_COLORS[r1]}}>{r1}</span> vs <span style={{color:REGION_COLORS[r2]}}>{r2}</span></div><Matchup teams={teams} pickKey={`F4-${si}`} picks={picks} onPick={makePick} disabled={locked} regionColor="#ff9050" matchNum={si}/></div>);})}
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,letterSpacing:2,color:"#ffb888",marginTop:16,marginBottom:8,textAlign:"center"}}>NATIONAL CHAMPIONSHIP {"\u2014"} MON APR 6</div>
            {(()=>{const teams=getChampTeams(picks);return <Matchup teams={teams} pickKey="CHAMP" picks={picks} onPick={makePick} disabled={locked} regionColor="#ff9050" matchNum={0}/>;})()}
            {picks["CHAMP"]&&(<div style={{background:"linear-gradient(135deg,#1e2030,#241e32)",border:"1px solid #b0aac8",borderRadius:10,padding:"16px",textAlign:"center",marginTop:12,animation:"slideUp 0.3s ease"}}>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:7,letterSpacing:4,color:"#ffb888",marginBottom:8}}>PREDICT THE FINAL SCORE</div>
              <div style={{fontSize:20,fontWeight:700,marginBottom:12}}>{"\uD83C\uDFC6"} {picks["CHAMP"]}</div>
              <div style={{display:"flex",gap:8,justifyContent:"center",alignItems:"center"}}>
                <div style={{textAlign:"center"}}><div style={{fontFamily:"'DM Mono',monospace",fontSize:8,color:"#e0e8f4",marginBottom:4}}>WINNER</div><input value={picks.champScore1||""} onChange={e=>makePick("champScore1",e.target.value)} placeholder="72" maxLength={3} disabled={locked} style={{width:60,textAlign:"center",background:"#222a38",border:"1px solid #a8b0c8",borderRadius:6,padding:"8px",color:"#70ffaa",fontSize:20,fontFamily:"'DM Mono',monospace",fontWeight:700}}/></div>
                <span style={{fontFamily:"'DM Mono',monospace",fontSize:14,color:"#707480",marginTop:16}}>{"\u2014"}</span>
                <div style={{textAlign:"center"}}><div style={{fontFamily:"'DM Mono',monospace",fontSize:8,color:"#e0e8f4",marginBottom:4}}>RUNNER-UP</div><input value={picks.champScore2||""} onChange={e=>makePick("champScore2",e.target.value)} placeholder="65" maxLength={3} disabled={locked} style={{width:60,textAlign:"center",background:"#222a38",border:"1px solid #a8b0c8",borderRadius:6,padding:"8px",color:"#ff8888",fontSize:20,fontFamily:"'DM Mono',monospace",fontWeight:700}}/></div>
              </div>
            </div>)}
            {!locked&&complete&&!confirmLock&&(<button onClick={()=>setConfirmLock(true)} style={{width:"100%",marginTop:16,background:"linear-gradient(135deg,#60ff90,#2acd5a)",border:"none",borderRadius:8,padding:"14px",color:"#08090c",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:12,fontWeight:700,letterSpacing:1}}>{"\uD83D\uDD12"} LOCK BRACKET</button>)}
            {!locked&&confirmLock&&(<div style={{background:"#48282e",border:"1px solid #b08088",borderRadius:8,padding:"14px",marginTop:16,textAlign:"center"}}><div style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:"#ff8888",marginBottom:8}}>Are you sure? Once locked, picks can't change.</div><div style={{display:"flex",gap:8}}><button onClick={()=>setConfirmLock(false)} style={{flex:1,background:"#242838",border:"1px solid #b8c8d8",borderRadius:6,padding:"10px",color:"#f2ede5",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:10}}>CANCEL</button><button onClick={lockBracket} style={{flex:1,background:"linear-gradient(135deg,#ed3d3d,#cd2a2a)",border:"none",borderRadius:6,padding:"10px",color:"#fff",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:10,fontWeight:700}}>YES, LOCK IT {"\uD83D\uDD12"}</button></div></div>)}
            {locked&&(<div style={{background:"#285030",border:"1px solid #80b08a",borderRadius:8,padding:"14px",marginTop:16,textAlign:"center"}}><div style={{fontFamily:"'DM Mono',monospace",fontSize:12,color:"#70ffc0"}}>{"\uD83D\uDD12"} BRACKET LOCKED {active.lockedAt?"\u2014 "+new Date(active.lockedAt).toLocaleString():""}</div></div>)}
          </div>)}

          {/* SCORES TAB */}
          {region==="SCORES"&&(()=>{
            const scored=brackets.filter(b=>b.locked).map(b=>{const s=scoreBracket(b.picks,resultsMap);return{...b,score:s,maxPossible:calcMaxPossible(b.picks,s,resultsMap)};}).sort((a,b)=>b.score.total-a.score.total);
            const elim=getEliminatedTeams(resultsMap);
            return(<div>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,letterSpacing:2,color:"#ffe050",marginBottom:8,textAlign:"center"}}>LEADERBOARD — SEED SHOCK SCORING</div>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:8,color:"#b0b8c8",textAlign:"center",marginBottom:12}}>Base: 1/2/4/8/16/32 per round · Upset bonus: seed gap - 2</div>
              {scored.length===0&&<div style={{textAlign:"center",padding:20,color:"#b0b8c8",fontSize:12}}>No locked brackets yet.</div>}
              {scored.map((b,idx)=>{
                const s=b.score;
                return(<div key={b.id} style={{background:idx===0?"#2a2830":"#1a1e2a",border:idx===0?"1px solid #ffe050":"1px solid #4a5068",borderLeft:idx===0?"4px solid #ffe050":idx===1?"4px solid #b0b8c8":idx===2?"4px solid #c08040":"4px solid #4a5068",borderRadius:8,marginBottom:8,padding:"12px 14px",animation:`slideUp 0.2s ease ${idx*0.05}s both`}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{fontFamily:"'DM Mono',monospace",fontSize:22,fontWeight:700,color:idx===0?"#ffe050":idx===1?"#d0d8e8":idx===2?"#d0a060":"#b0b8c8",minWidth:28,textAlign:"center"}}>{idx+1}</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:15,fontWeight:700,color:"#faf6f0"}}>{b.name}</div>
                      <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:"#b0b8c8",marginTop:2}}>{s.correct}{"\u2713"} {s.wrong}{"\u2717"} {s.pending}?</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontFamily:"'DM Mono',monospace",fontSize:26,fontWeight:700,color:idx===0?"#ffe050":"#faf6f0"}}>{s.total}</div>
                      <div style={{fontFamily:"'DM Mono',monospace",fontSize:7,color:"#b0b8c8"}}>{s.base} base + {s.bonus} upset</div>
                      <div style={{fontFamily:"'DM Mono',monospace",fontSize:8,color:"#80c8ff",marginTop:1}}>max: {b.maxPossible}</div>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:4,marginTop:10,flexWrap:"wrap"}}>
                    {SCORE_ROUNDS.map(r=>{const rd=s.byRound[r];if(!rd||rd.correct+rd.wrong+rd.pending===0)return null;
                      return(<div key={r} style={{flex:1,minWidth:45,background:"#13151f",border:"1px solid #4a5068",borderRadius:5,padding:"5px 6px",textAlign:"center"}}>
                        <div style={{fontFamily:"'DM Mono',monospace",fontSize:7,color:"#b0b8c8",marginBottom:2}}>{SCORE_ROUND_NAMES[r]}</div>
                        <div style={{fontFamily:"'DM Mono',monospace",fontSize:14,fontWeight:700,color:rd.pts>0?"#70ffaa":"#707480"}}>{rd.pts}</div>
                        <div style={{fontFamily:"'DM Mono',monospace",fontSize:7}}><span style={{color:"#70ffaa"}}>{rd.correct}{"\u2713"}</span>{" "}<span style={{color:"#ff8888"}}>{rd.wrong}{"\u2717"}</span>{rd.pending>0&&<span style={{color:"#80c8ff"}}> {rd.pending}?</span>}</div>
                        {rd.bonus>0&&<div style={{fontFamily:"'DM Mono',monospace",fontSize:7,color:"#ffe050"}}>+{rd.bonus}</div>}
                      </div>);
                    })}
                  </div>
                  <div style={{marginTop:8,display:"flex",flexWrap:"wrap",gap:3}}>
                    {Object.values(s.byRound).flatMap(rd=>rd.picks).filter(p=>p.status!=="pending"&&(p.bonus>0||p.status==="wrong")).slice(0,8).map((p,pi)=>(
                      <span key={pi} style={{fontFamily:"'DM Mono',monospace",fontSize:7,padding:"2px 5px",borderRadius:3,background:p.status==="correct"?"#1e4028":"#48282e",color:p.status==="correct"?"#70ffaa":"#ff8888",border:p.status==="correct"?"1px solid #3a6a42":"1px solid #6a4048"}}>
                        {p.status==="correct"?"\u2713":"\u2717"} {p.team} {p.bonus>0?`+${p.bonus}`:""}
                      </span>
                    ))}
                  </div>
                  {(()=>{const e8p=REGIONS.map(r=>b.picks[`${r}-E8-0`]).filter(Boolean);const alive=e8p.filter(t=>!elim.has(t));const cp=b.picks["CHAMP"];const ca=cp&&!elim.has(cp);
                    if(e8p.length===0)return null;
                    return(<div style={{marginTop:8,fontFamily:"'DM Mono',monospace",fontSize:8,lineHeight:1.6}}>
                      {ca&&<div style={{color:"#70ffaa"}}>{"\uD83D\uDC51"} Champ pick {cp} still alive</div>}
                      {!ca&&cp&&<div style={{color:"#ff8888"}}>{"\uD83D\uDC80"} Champ pick {cp} eliminated</div>}
                      {alive.length>0&&<div style={{color:"#80c8ff"}}>{"\uD83D\uDD2E"} Region champs alive: {alive.join(", ")} ({alive.length}/4)</div>}
                    </div>);
                  })()}
                </div>);
              })}
              <a href="/scores.html" style={{display:"block",textAlign:"center",marginTop:12,fontFamily:"'DM Mono',monospace",fontSize:8,color:"#ffa070",textDecoration:"none"}}>Full detailed scoreboard {"\u2192"}</a>
            </div>);
          })()}
        </>)}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<BracketApp />);
</script>
</body>
</html>
