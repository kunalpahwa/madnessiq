<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MadnessIQ — Fill Your Bracket</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #08090c; color: #e2ddd5; font-family: 'Libre Baskerville', Georgia, serif; min-height: 100vh; }
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-thumb { background: #2a2d35; border-radius: 2px; }
  @keyframes slideUp { from { opacity:0; transform:translateY(8px) } to { opacity:1; transform:translateY(0) } }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  input:focus { outline: none; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const SUPABASE_URL = "https://wbjtljlhmnboiyfkdvfn.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndianRsamxobW5ib2l5ZmtkdmZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMTYzNjcsImV4cCI6MjA4OTc5MjM2N30.DAKCTdrZ-SaE3gYo6iwVyo65MMJEvM1qzGiqpl0dclQ";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const TEAMS = {
  EAST: [{s:1,t:"Duke"},{s:16,t:"Siena"},{s:8,t:"Ohio State"},{s:9,t:"TCU"},{s:5,t:"St. John's"},{s:12,t:"Northern Iowa"},{s:4,t:"Kansas"},{s:13,t:"Cal Baptist"},{s:6,t:"Louisville"},{s:11,t:"S. Florida"},{s:3,t:"Michigan St."},{s:14,t:"N. Dakota St."},{s:7,t:"UCLA"},{s:10,t:"UCF"},{s:2,t:"UConn"},{s:15,t:"Furman"}],
  WEST: [{s:1,t:"Arizona"},{s:16,t:"Long Island"},{s:8,t:"Villanova"},{s:9,t:"Utah State"},{s:5,t:"Wisconsin"},{s:12,t:"High Point"},{s:4,t:"Arkansas"},{s:13,t:"Hawaii"},{s:6,t:"BYU"},{s:11,t:"Texas"},{s:3,t:"Gonzaga"},{s:14,t:"Kennesaw St."},{s:7,t:"Miami (FL)"},{s:10,t:"Missouri"},{s:2,t:"Purdue"},{s:15,t:"Queens"}],
  SOUTH: [{s:1,t:"Florida"},{s:16,t:"Prairie View"},{s:8,t:"Clemson"},{s:9,t:"Iowa"},{s:5,t:"Vanderbilt"},{s:12,t:"McNeese"},{s:4,t:"Nebraska"},{s:13,t:"Troy"},{s:6,t:"North Carolina"},{s:11,t:"VCU"},{s:3,t:"Illinois"},{s:14,t:"Penn"},{s:7,t:"Saint Mary's"},{s:10,t:"Texas A&M"},{s:2,t:"Houston"},{s:15,t:"Idaho"}],
  MIDWEST: [{s:1,t:"Michigan"},{s:16,t:"Howard"},{s:8,t:"Georgia"},{s:9,t:"Saint Louis"},{s:5,t:"Texas Tech"},{s:12,t:"Akron"},{s:4,t:"Alabama"},{s:13,t:"Hofstra"},{s:6,t:"Tennessee"},{s:11,t:"Miami (OH)"},{s:3,t:"Virginia"},{s:14,t:"Wright State"},{s:7,t:"Kentucky"},{s:10,t:"Santa Clara"},{s:2,t:"Iowa State"},{s:15,t:"Tenn. State"}],
};
const REGIONS = ["EAST","WEST","SOUTH","MIDWEST"];
const ROUNDS = ["R64","R32","S16","E8"];
const ROUND_NAMES = {R64:"Round of 64",R32:"Round of 32",S16:"Sweet 16",E8:"Elite Eight"};
const REGION_COLORS = {EAST:"#3d7aed",WEST:"#ed5a3d",SOUTH:"#3ded7a",MIDWEST:"#edcc3d"};
const REGION_SITES = {EAST:"Washington, D.C.",WEST:"San Jose, CA",SOUTH:"Houston, TX",MIDWEST:"Chicago, IL"};
const F4_MATCHUP = [["EAST","SOUTH"],["WEST","MIDWEST"]];

function getMatchupTeams(region, round, matchIdx, picks) {
  if (round === "R64") { const t = TEAMS[region]; const i = matchIdx*2; return [t[i], t[i+1]]; }
  const prev = ROUNDS[ROUNDS.indexOf(round)-1];
  const a = picks[`${region}-${prev}-${matchIdx*2}`], b = picks[`${region}-${prev}-${matchIdx*2+1}`];
  const fs = (n) => { const t = TEAMS[region].find(x=>x.t===n); return t?t.s:"?"; };
  return [a?{s:fs(a),t:a}:null, b?{s:fs(b),t:b}:null];
}
function getF4Teams(si, picks) {
  const [r1,r2] = F4_MATCHUP[si];
  const a=picks[`${r1}-E8-0`], b=picks[`${r2}-E8-0`];
  const fs=(n,r)=>{const t=TEAMS[r].find(x=>x.t===n);return t?t.s:"?";};
  return [a?{s:fs(a,r1),t:a,region:r1}:null, b?{s:fs(b,r2),t:b,region:r2}:null];
}
function getChampTeams(picks) {
  const a=picks["F4-0"],b=picks["F4-1"];
  const fi=(n)=>{for(const r of REGIONS){const t=TEAMS[r].find(x=>x.t===n);if(t)return{s:t.s,t:n,region:r};}return{s:"?",t:n};};
  return [a?fi(a):null, b?fi(b):null];
}
function clearDownstream(picks, region, round, matchIdx) {
  const np={...picks}; const ri=ROUNDS.indexOf(round); let mi=matchIdx;
  for(let r=ri+1;r<ROUNDS.length;r++){mi=Math.floor(mi/2);delete np[`${region}-${ROUNDS[r]}-${mi}`];}
  if(round==="E8"||ri<ROUNDS.indexOf("E8")){const fi=F4_MATCHUP.findIndex(p=>p.includes(region));if(fi>=0){delete np[`F4-${fi}`];delete np["CHAMP"];delete np["champScore1"];delete np["champScore2"];}}
  return np;
}
function countPicks(p){return Object.keys(p).filter(k=>!k.startsWith("champScore")&&p[k]).length;}
function isBracketComplete(p){return countPicks(p)===63&&p.champScore1&&p.champScore2;}

function TeamSlot({team,isPicked,onClick,disabled,regionColor}) {
  if(!team) return (<div style={{height:36,background:"#0c0e16",border:"1px dashed #3a3f52",borderRadius:6,display:"flex",alignItems:"center",padding:"0 10px",fontFamily:"'DM Mono',monospace",fontSize:9,color:"#3a3d48"}}>{"— waiting —"}</div>);
  return (<div onClick={disabled?undefined:onClick} style={{height:36,background:isPicked?"#0a1a10":"#0e1016",border:isPicked?`1px solid ${regionColor}40`:"1px solid #1a1d28",borderLeft:isPicked?`3px solid ${regionColor}`:"3px solid transparent",borderRadius:6,display:"flex",alignItems:"center",padding:"0 10px",gap:6,cursor:disabled?"default":"pointer",transition:"all 0.15s ease",opacity:disabled?0.5:1}}>
    <span style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:"#6a7080",minWidth:16}}>{team.s}</span>
    <span style={{fontSize:12,fontWeight:isPicked?700:400,color:isPicked?"#4aed7a":"#e2ddd5",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{team.t}</span>
    {isPicked && <span style={{marginLeft:"auto",fontSize:10,color:"#3ded7a"}}>{"\u2713"}</span>}
  </div>);
}
function Matchup({teams,pickKey,picks,onPick,disabled,regionColor,matchNum}) {
  const [t1,t2]=teams; const cur=picks[pickKey];
  return (<div style={{marginBottom:6,animation:`slideUp 0.2s ease ${matchNum*0.03}s both`}}><div style={{display:"flex",flexDirection:"column",gap:2}}>
    <TeamSlot team={t1} isPicked={cur===t1?.t} onClick={()=>t1&&onPick(pickKey,t1.t)} disabled={disabled||!t1} regionColor={regionColor}/>
    <TeamSlot team={t2} isPicked={cur===t2?.t} onClick={()=>t2&&onPick(pickKey,t2.t)} disabled={disabled||!t2} regionColor={regionColor}/>
  </div></div>);
}

function BracketApp() {
  const [screen,setScreen]=useState("join");
  const [roomCode,setRoomCode]=useState(()=>localStorage.getItem("miq_room")||"");
  const [brackets,setBrackets]=useState([]);
  const [activeIdx,setActiveIdx]=useState(0);
  const [region,setRegion]=useState("EAST");
  const [confirmLock,setConfirmLock]=useState(false);
  const [saving,setSaving]=useState(false);
  const [loading,setLoading]=useState(false);
  const [showCreate,setShowCreate]=useState(false);
  const [newName,setNewName]=useState("");
  const [confirmDelete,setConfirmDelete]=useState(null);
  const saveTimer=useRef(null);
  const active=brackets[activeIdx]||null;
  const picks=active?.picks||{};
  const locked=active?.locked||false;

  const joinRoom = async () => {
    const code=roomCode.trim().toUpperCase();
    if(!code) return;
    localStorage.setItem("miq_room",code);
    setRoomCode(code); setLoading(true);

    // Migrate old localStorage brackets to Supabase
    try {
      const oldBrackets = JSON.parse(localStorage.getItem("miq_brackets") || "[]");
      if (oldBrackets.length > 0) {
        for (const ob of oldBrackets) {
          if (!ob.name || !ob.picks || Object.keys(ob.picks).length === 0) continue;
          const {data: existing} = await sb.from("brackets").select("id").eq("room_code", code).eq("name", ob.name).single();
          if (!existing) {
            await sb.from("brackets").insert({
              room_code: code, name: ob.name, picks: ob.picks,
              locked: ob.locked || false, locked_at: ob.lockedAt || null
            });
          }
        }
        localStorage.removeItem("miq_brackets");
      }
    } catch(e) { console.log("Migration:", e); }

    const {data}=await sb.from("brackets").select("*").eq("room_code",code).order("created_at");
    const all=(data||[]).map(r=>({id:r.id,name:r.name,picks:r.picks||{},locked:r.locked,lockedAt:r.locked_at,created:r.created_at}));
    setBrackets(all);
    setActiveIdx(all.length > 0 ? 0 : 0);
    setLoading(false); setScreen("bracket");
  };

  const createBracket = async () => {
    const name = newName.trim();
    if (!name || !roomCode) return;
    const exists = brackets.find(b => b.name === name);
    if (exists) { alert("That name is already taken in this room."); return; }
    const {data:nr} = await sb.from("brackets").insert({room_code:roomCode,name,picks:{},locked:false}).select().single();
    if (nr) {
      const newB = {id:nr.id,name:nr.name,picks:nr.picks||{},locked:nr.locked,lockedAt:nr.locked_at,created:nr.created_at};
      setBrackets(prev => [...prev, newB]);
      setActiveIdx(brackets.length);
    }
    setNewName(""); setShowCreate(false);
  };

  const deleteBracket = async (idx) => {
    const b = brackets[idx];
    if (!b || b.locked) return;
    await sb.from("brackets").delete().eq("id", b.id);
    setBrackets(prev => prev.filter((_,i) => i !== idx));
    if (activeIdx >= idx && activeIdx > 0) setActiveIdx(activeIdx - 1);
    else if (brackets.length <= 1) setActiveIdx(0);
    setConfirmDelete(null);
  };

  useEffect(()=>{
    if(screen!=="bracket"||!roomCode) return;
    const ch=sb.channel("room-"+roomCode).on("postgres_changes",{event:"*",schema:"public",table:"brackets",filter:`room_code=eq.${roomCode}`},(payload)=>{
      if(payload.eventType==="INSERT"){setBrackets(prev=>{if(prev.find(b=>b.id===payload.new.id))return prev;return[...prev,{id:payload.new.id,name:payload.new.name,picks:payload.new.picks||{},locked:payload.new.locked,lockedAt:payload.new.locked_at,created:payload.new.created_at}];});}
      else if(payload.eventType==="UPDATE"){setBrackets(prev=>prev.map(b=>b.id===payload.new.id?{...b,picks:payload.new.picks||{},locked:payload.new.locked,lockedAt:payload.new.locked_at}:b));}
    }).subscribe();
    return ()=>{sb.removeChannel(ch);};
  },[screen,roomCode]);

  const savePicks=useCallback((bracket)=>{
    if(!bracket?.id||bracket.locked)return;
    if(saveTimer.current)clearTimeout(saveTimer.current);
    setSaving(true);
    saveTimer.current=setTimeout(async()=>{
      await sb.from("brackets").update({picks:bracket.picks,updated_at:new Date().toISOString()}).eq("id",bracket.id);
      setSaving(false);
    },800);
  },[]);

  const makePick=useCallback((key,team)=>{
    if(locked) return;
    setBrackets(prev=>{
      const up=[...prev]; const br={...up[activeIdx]}; let np={...br.picks};
      if(np[key]&&np[key]!==team){const parts=key.split("-");if(parts.length===3)np=clearDownstream(np,parts[0],parts[1],parseInt(parts[2]));else if(key.startsWith("F4-")){delete np["CHAMP"];delete np["champScore1"];delete np["champScore2"];}}
      np[key]=team; br.picks=np; up[activeIdx]=br; savePicks(br); return up;
    });
  },[activeIdx,locked,savePicks]);

  const lockBracket=async()=>{
    if(!active?.id)return; const now=new Date().toISOString();
    await sb.from("brackets").update({locked:true,locked_at:now}).eq("id",active.id);
    setBrackets(prev=>prev.map((b,i)=>i===activeIdx?{...b,locked:true,lockedAt:now}:b));
    setConfirmLock(false);
  };

  const totalPicks=active?countPicks(picks):0;
  const complete=active?isBracketComplete(picks):false;
  const regionPicks=(r)=>Object.keys(picks).filter(k=>k.startsWith(r+"-")&&picks[k]).length;

  if(screen==="join") return (
    <div style={{maxWidth:520,margin:"0 auto",minHeight:"100vh",display:"flex",flexDirection:"column",justifyContent:"center",padding:"20px"}}>
      <div style={{textAlign:"center",marginBottom:30}}>
        <h1 style={{fontSize:24,fontWeight:700,margin:"0 0 4px"}}><span style={{color:"#ff6b3d"}}>Madness</span><span>IQ</span></h1>
        <div style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:"#8090a0",letterSpacing:2}}>BRACKET CHALLENGE</div>
      </div>
      <div style={{background:"linear-gradient(135deg,#101420,#141018)",border:"1px solid #4a4568",borderRadius:12,padding:"24px"}}>
        <div style={{fontFamily:"'DM Mono',monospace",fontSize:8,letterSpacing:2,color:"#ff6b3d",marginBottom:16}}>ENTER ROOM CODE</div>
        <div style={{fontSize:12,color:"#a0a3ae",marginBottom:16,lineHeight:1.6}}>Everyone in your family enters the same code to see all brackets in one place.</div>
        <div style={{marginBottom:18}}>
          <input value={roomCode} onChange={e=>setRoomCode(e.target.value.toUpperCase())} onKeyDown={e=>e.key==="Enter"&&joinRoom()} placeholder="e.g. PAHWA" maxLength={20} style={{width:"100%",background:"#0a0c14",border:"1px solid #3a3f52",borderRadius:6,padding:"12px",color:"#ff6b3d",fontSize:22,fontFamily:"'DM Mono',monospace",fontWeight:700,letterSpacing:4,textTransform:"uppercase",textAlign:"center"}}/>
        </div>
        <button onClick={joinRoom} disabled={!roomCode.trim()||loading} style={{width:"100%",background:roomCode.trim()?"linear-gradient(135deg,#ff6b3d,#ed4a2a)":"#1a1d28",border:"none",borderRadius:8,padding:"12px",color:"#fff",cursor:roomCode.trim()?"pointer":"default",fontFamily:"'DM Mono',monospace",fontSize:12,fontWeight:700,letterSpacing:1}}>{loading?"JOINING...":"ENTER ROOM \u2192"}</button>
      </div>
      <a href="/" style={{display:"block",textAlign:"center",marginTop:16,fontFamily:"'DM Mono',monospace",fontSize:8,color:"#ff6b3d",textDecoration:"none"}}>{"\u2190"} BACK TO MADNESSIQ</a>
    </div>
  );

  return (
    <div style={{maxWidth:520,margin:"0 auto",minHeight:"100vh"}}>
      <div style={{background:"linear-gradient(180deg,#0e1018,#08090c)",borderBottom:"1px solid #2e3140",padding:"12px 16px 8px",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <a href="/" style={{textDecoration:"none"}}><h1 style={{fontSize:17,fontWeight:700,margin:0}}><span style={{color:"#ff6b3d"}}>Madness</span><span style={{color:"#e2ddd5"}}>IQ</span><span style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:"#8090a0",marginLeft:6}}>BRACKET</span></h1></a>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontFamily:"'DM Mono',monospace",fontSize:8,color:"#ff6b3d",background:"#1a1014",padding:"2px 8px",borderRadius:4,border:"1px solid #4a3a30"}}>{roomCode}</span>
            {saving && <span style={{fontFamily:"'DM Mono',monospace",fontSize:7,color:"#edaa3d",animation:"pulse 1s infinite"}}>saving...</span>}
          </div>
        </div>
        <div style={{display:"flex",gap:4,marginTop:8,alignItems:"center",overflowX:"auto"}}>
          {brackets.map((b,i)=>(<button key={b.id||i} onClick={()=>{setActiveIdx(i);setConfirmDelete(null);}} style={{background:activeIdx===i?"#1a1d28":"transparent",border:activeIdx===i?"1px solid #4a5570":"1px solid #2e3140",color:activeIdx===i?"#e2ddd5":"#6a7080",padding:"4px 10px",borderRadius:4,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"'DM Mono',monospace",fontSize:9}}>{b.name} {b.locked?"\uD83D\uDD12":""}</button>))}
          <button onClick={()=>setShowCreate(true)} style={{background:"transparent",border:"1px dashed #4a5570",color:"#ff6b3d",padding:"4px 10px",borderRadius:4,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"'DM Mono',monospace",fontSize:9}}>+ NEW</button>
        </div>
      </div>
      <div style={{padding:"12px 16px 80px"}}>
        {/* Create bracket form */}
        {showCreate && (
          <div style={{background:"linear-gradient(135deg,#101420,#141018)",border:"1px solid #4a4568",borderRadius:8,padding:"16px",marginBottom:10,animation:"slideUp 0.2s ease"}}>
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:8,letterSpacing:2,color:"#ff6b3d",marginBottom:8}}>CREATE NEW BRACKET</div>
            <div style={{display:"flex",gap:6}}>
              <input value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&createBracket()} placeholder="Enter name..." style={{flex:1,background:"#0a0c14",border:"1px solid #3a3f52",borderRadius:6,padding:"8px 10px",color:"#e2ddd5",fontSize:13,fontFamily:"'Libre Baskerville',Georgia,serif"}}/>
              <button onClick={createBracket} disabled={!newName.trim()} style={{background:newName.trim()?"linear-gradient(135deg,#ff6b3d,#ed4a2a)":"#1a1d28",border:"none",borderRadius:6,padding:"8px 14px",color:"#fff",cursor:newName.trim()?"pointer":"default",fontFamily:"'DM Mono',monospace",fontSize:9,fontWeight:700}}>CREATE</button>
              <button onClick={()=>{setShowCreate(false);setNewName("");}} style={{background:"transparent",border:"1px solid #4a5570",borderRadius:6,padding:"8px 10px",color:"#6a7080",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:9}}>X</button>
            </div>
          </div>
        )}

        {/* No brackets yet */}
        {brackets.length === 0 && !showCreate && (
          <div style={{textAlign:"center",padding:"40px 20px"}}>
            <div style={{fontSize:14,color:"#6a7080",marginBottom:12}}>No brackets in this room yet.</div>
            <button onClick={()=>setShowCreate(true)} style={{background:"linear-gradient(135deg,#ff6b3d,#ed4a2a)",border:"none",borderRadius:8,padding:"12px 24px",color:"#fff",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:11,fontWeight:700,letterSpacing:1}}>CREATE FIRST BRACKET</button>
          </div>
        )}

        {active && (<>
          {/* Delete button for unlocked brackets */}
          {!locked && confirmDelete !== activeIdx && (
            <div style={{display:"flex",justifyContent:"flex-end",marginBottom:6}}>
              <button onClick={()=>setConfirmDelete(activeIdx)} style={{background:"transparent",border:"1px solid #2a1a1e",borderRadius:4,padding:"3px 8px",color:"#6a4048",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:7,letterSpacing:1}}>DELETE THIS BRACKET</button>
            </div>
          )}
          {confirmDelete === activeIdx && (
            <div style={{background:"#1a0e10",border:"1px solid #4a2a2e",borderRadius:6,padding:"10px",marginBottom:8,textAlign:"center"}}>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:"#ed5a5a",marginBottom:6}}>Delete {active.name}'s bracket? This can't be undone.</div>
              <div style={{display:"flex",gap:6,justifyContent:"center"}}>
                <button onClick={()=>setConfirmDelete(null)} style={{background:"#1a1d28",border:"1px solid #4a5570",borderRadius:4,padding:"6px 14px",color:"#e2ddd5",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:9}}>CANCEL</button>
                <button onClick={()=>deleteBracket(activeIdx)} style={{background:"linear-gradient(135deg,#ed3d3d,#cd2a2a)",border:"none",borderRadius:4,padding:"6px 14px",color:"#fff",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:9,fontWeight:700}}>DELETE</button>
              </div>
            </div>
          )}
          <div style={{background:"#0c0e14",borderRadius:8,padding:"10px 12px",marginBottom:10,border:"1px solid #2e3140"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <span style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:"#e2ddd5"}}>{active.name}'s Bracket {locked&&"\uD83D\uDD12 LOCKED"}</span>
              <span style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:complete?"#3ded7a":"#ff6b3d"}}>{totalPicks}/63 picks</span>
            </div>
            <div style={{height:4,background:"#1a1d28",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",background:complete?"#3ded7a":"linear-gradient(90deg,#ff6b3d,#ed4a2a)",width:`${(totalPicks/63)*100}%`,borderRadius:2,transition:"width 0.3s ease"}}/></div>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:6}}>{REGIONS.map(r=>(<span key={r} style={{fontFamily:"'DM Mono',monospace",fontSize:7,color:REGION_COLORS[r]}}>{r}: {regionPicks(r)}/15</span>))}</div>
          </div>
          <div style={{display:"flex",gap:2,marginBottom:8}}>{[...REGIONS,"FINAL4"].map(r=>(<button key={r} onClick={()=>setRegion(r)} style={{flex:1,background:region===r?"#1a1d28":"transparent",borderBottom:region===r?`2px solid ${r==="FINAL4"?"#ff6b3d":REGION_COLORS[r]}`:"2px solid transparent",border:"none",borderTop:"none",borderLeft:"none",borderRight:"none",color:region===r?"#e2ddd5":"#6a7080",padding:"6px 2px 4px",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:r==="FINAL4"?8:9,letterSpacing:1}}>{r==="FINAL4"?"FINAL 4":r}</button>))}</div>

          {REGIONS.includes(region) && (<div>
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:8,color:"#6a7080",marginBottom:8,textAlign:"center"}}>{REGION_SITES[region]} Regional</div>
            {ROUNDS.map((round,rIdx)=>{const num=8/Math.pow(2,rIdx);return(<div key={round} style={{marginBottom:14}}>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:8,letterSpacing:2,color:REGION_COLORS[region],marginBottom:6}}>{ROUND_NAMES[round]}</div>
              {Array.from({length:num},(_,i)=>{const key=`${region}-${round}-${i}`;const teams=getMatchupTeams(region,round,i,picks);return <Matchup key={key} teams={teams} pickKey={key} picks={picks} onPick={makePick} disabled={locked} regionColor={REGION_COLORS[region]} matchNum={i}/>;})}
            </div>);})}
            {picks[`${region}-E8-0`]&&(<div style={{background:"linear-gradient(135deg,#101420,#141018)",border:`1px solid ${REGION_COLORS[region]}50`,borderRadius:8,padding:"12px",textAlign:"center",animation:"slideUp 0.3s ease"}}><div style={{fontFamily:"'DM Mono',monospace",fontSize:7,letterSpacing:2,color:REGION_COLORS[region]}}>{region} CHAMPION</div><div style={{fontSize:18,fontWeight:700,marginTop:4}}>{picks[`${region}-E8-0`]}</div><div style={{fontFamily:"'DM Mono',monospace",fontSize:8,color:"#6a7080",marginTop:2}}>{"\u2192"} FINAL FOUR</div></div>)}
          </div>)}

          {region==="FINAL4"&&(<div>
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:8,letterSpacing:2,color:"#ff6b3d",marginBottom:8,textAlign:"center"}}>FINAL FOUR {"\u2014"} INDIANAPOLIS {"\u2014"} SAT APR 4</div>
            {[0,1].map(si=>{const [r1,r2]=F4_MATCHUP[si];const teams=getF4Teams(si,picks);return(<div key={si} style={{marginBottom:12}}><div style={{fontFamily:"'DM Mono',monospace",fontSize:8,color:"#8090a0",marginBottom:4}}>SEMIFINAL {si+1}: <span style={{color:REGION_COLORS[r1]}}>{r1}</span> vs <span style={{color:REGION_COLORS[r2]}}>{r2}</span></div><Matchup teams={teams} pickKey={`F4-${si}`} picks={picks} onPick={makePick} disabled={locked} regionColor="#ff6b3d" matchNum={si}/></div>);})}
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:8,letterSpacing:2,color:"#ff6b3d",marginTop:16,marginBottom:8,textAlign:"center"}}>NATIONAL CHAMPIONSHIP {"\u2014"} MON APR 6</div>
            {(()=>{const teams=getChampTeams(picks);return <Matchup teams={teams} pickKey="CHAMP" picks={picks} onPick={makePick} disabled={locked} regionColor="#ff6b3d" matchNum={0}/>;})()}
            {picks["CHAMP"]&&(<div style={{background:"linear-gradient(135deg,#141620,#1a1428)",border:"1px solid #4a4568",borderRadius:10,padding:"16px",textAlign:"center",marginTop:12,animation:"slideUp 0.3s ease"}}>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:7,letterSpacing:4,color:"#ff6b3d",marginBottom:8}}>PREDICT THE FINAL SCORE</div>
              <div style={{fontSize:20,fontWeight:700,marginBottom:12}}>{"\uD83C\uDFC6"} {picks["CHAMP"]}</div>
              <div style={{display:"flex",gap:8,justifyContent:"center",alignItems:"center"}}>
                <div style={{textAlign:"center"}}><div style={{fontFamily:"'DM Mono',monospace",fontSize:8,color:"#8090a0",marginBottom:4}}>WINNER</div><input value={picks.champScore1||""} onChange={e=>makePick("champScore1",e.target.value)} placeholder="72" maxLength={3} disabled={locked} style={{width:60,textAlign:"center",background:"#0a0c14",border:"1px solid #3a3f52",borderRadius:6,padding:"8px",color:"#3ded7a",fontSize:20,fontFamily:"'DM Mono',monospace",fontWeight:700}}/></div>
                <span style={{fontFamily:"'DM Mono',monospace",fontSize:14,color:"#4a4d58",marginTop:16}}>{"\u2014"}</span>
                <div style={{textAlign:"center"}}><div style={{fontFamily:"'DM Mono',monospace",fontSize:8,color:"#8090a0",marginBottom:4}}>RUNNER-UP</div><input value={picks.champScore2||""} onChange={e=>makePick("champScore2",e.target.value)} placeholder="65" maxLength={3} disabled={locked} style={{width:60,textAlign:"center",background:"#0a0c14",border:"1px solid #3a3f52",borderRadius:6,padding:"8px",color:"#ed5a5a",fontSize:20,fontFamily:"'DM Mono',monospace",fontWeight:700}}/></div>
              </div>
            </div>)}
            {!locked&&complete&&!confirmLock&&(<button onClick={()=>setConfirmLock(true)} style={{width:"100%",marginTop:16,background:"linear-gradient(135deg,#3ded7a,#2acd5a)",border:"none",borderRadius:8,padding:"14px",color:"#08090c",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:12,fontWeight:700,letterSpacing:1}}>{"\uD83D\uDD12"} LOCK BRACKET</button>)}
            {!locked&&confirmLock&&(<div style={{background:"#1a0e10",border:"1px solid #4a2a2e",borderRadius:8,padding:"14px",marginTop:16,textAlign:"center"}}><div style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:"#ed5a5a",marginBottom:8}}>Are you sure? Once locked, picks can't change.</div><div style={{display:"flex",gap:8}}><button onClick={()=>setConfirmLock(false)} style={{flex:1,background:"#1a1d28",border:"1px solid #4a5570",borderRadius:6,padding:"10px",color:"#e2ddd5",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:10}}>CANCEL</button><button onClick={lockBracket} style={{flex:1,background:"linear-gradient(135deg,#ed3d3d,#cd2a2a)",border:"none",borderRadius:6,padding:"10px",color:"#fff",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:10,fontWeight:700}}>YES, LOCK IT {"\uD83D\uDD12"}</button></div></div>)}
            {locked&&(<div style={{background:"#0a1a10",border:"1px solid #2a4a32",borderRadius:8,padding:"14px",marginTop:16,textAlign:"center"}}><div style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:"#3ded7a"}}>{"\uD83D\uDD12"} BRACKET LOCKED {active.lockedAt?"\u2014 "+new Date(active.lockedAt).toLocaleString():""}</div></div>)}
          </div>)}
        </>)}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<BracketApp />);
</script>
</body>
</html>
