<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MadnessIQ v2 — Tournament Retrospective</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@300;400;500;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0e14;
  --surface: #12151e;
  --surface2: #181c28;
  --border: #252a3a;
  --text: #d8d4cc;
  --text2: #8a8d9a;
  --text3: #5a5d6a;
  --green: #3ded7a;
  --red: #ed5a5a;
  --gold: #f0c040;
  --blue: #4a9aed;
  --orange: #ff8855;
  --serif: 'Instrument Serif', 'Source Serif 4', Georgia, serif;
  --mono: 'JetBrains Mono', monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:var(--serif); line-height:1.7; }
.container { max-width:720px; margin:0 auto; padding:20px 16px 80px; }

/* Header */
.header { text-align:center; padding:40px 0 30px; border-bottom:1px solid var(--border); margin-bottom:40px; }
.header h1 { font-size:32px; font-weight:400; letter-spacing:-0.5px; margin-bottom:4px; }
.header h1 span { color:var(--orange); }
.header .sub { font-family:var(--mono); font-size:10px; color:var(--text3); letter-spacing:3px; text-transform:uppercase; }
.header .thesis { font-size:15px; color:var(--text2); font-style:italic; max-width:520px; margin:16px auto 0; line-height:1.6; }

/* Navigation */
.nav { display:flex; gap:4px; margin-bottom:32px; overflow-x:auto; -webkit-overflow-scrolling:touch; padding-bottom:4px; }
.nav button { font-family:var(--mono); font-size:9px; letter-spacing:1.5px; padding:8px 14px; border:1px solid var(--border); background:transparent; color:var(--text3); border-radius:4px; cursor:pointer; white-space:nowrap; transition:all 0.2s; }
.nav button:hover { border-color:var(--text2); color:var(--text2); }
.nav button.active { background:var(--surface2); border-color:var(--orange); color:var(--orange); }

/* Round sections */
.round { display:none; animation:fadeIn 0.3s ease; }
.round.active { display:block; }
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

.round-header { margin-bottom:28px; }
.round-header h2 { font-size:24px; font-weight:400; margin-bottom:4px; }
.round-header .record { font-family:var(--mono); font-size:11px; color:var(--text2); }
.round-header .context { font-size:15px; color:var(--text2); margin-top:12px; line-height:1.7; border-left:2px solid var(--border); padding-left:16px; }

/* Assessment cards */
.assessment { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:16px 18px; margin-bottom:16px; }
.assessment .matchup { font-family:var(--mono); font-size:10px; color:var(--text3); letter-spacing:2px; margin-bottom:6px; }
.assessment .teams { font-size:18px; font-weight:400; margin-bottom:8px; }
.assessment .teams .seed { font-family:var(--mono); font-size:11px; color:var(--text3); }
.assessment .teams .vs { color:var(--text3); font-size:14px; margin:0 8px; }

/* Probability bar */
.prob-bar { display:flex; height:24px; border-radius:4px; overflow:hidden; margin:10px 0; font-family:var(--mono); font-size:9px; letter-spacing:1px; }
.prob-bar .fav { background:var(--green); color:#0a0a0a; display:flex; align-items:center; padding:0 8px; font-weight:700; }
.prob-bar .dog { background:var(--surface2); color:var(--text2); display:flex; align-items:center; justify-content:flex-end; padding:0 8px; flex:1; }

/* Market comparison */
.market-compare { display:flex; gap:12px; margin:10px 0; }
.market-compare .col { flex:1; background:var(--surface2); border-radius:4px; padding:8px 10px; }
.market-compare .col .label { font-family:var(--mono); font-size:7px; color:var(--text3); letter-spacing:1.5px; margin-bottom:2px; }
.market-compare .col .val { font-family:var(--mono); font-size:13px; font-weight:700; }
.market-compare .col .val.green { color:var(--green); }
.market-compare .col .val.gold { color:var(--gold); }
.market-compare .col .val.blue { color:var(--blue); }

/* Reasoning */
.reasoning { font-size:14px; color:var(--text2); line-height:1.7; margin:12px 0; }
.reasoning strong { color:var(--text); font-weight:400; }

/* Value tag */
.value-tag { display:inline-block; font-family:var(--mono); font-size:8px; letter-spacing:1.5px; padding:3px 8px; border-radius:3px; margin-top:6px; }
.value-tag.edge { background:#0a1a10; border:1px solid #1a3a22; color:var(--green); }
.value-tag.no-edge { background:var(--surface2); border:1px solid var(--border); color:var(--text3); }
.value-tag.upset-value { background:#1a1410; border:1px solid #3a2a1a; color:var(--gold); }

/* Result */
.result-strip { display:flex; align-items:center; gap:8px; margin-top:10px; padding:8px 10px; border-radius:4px; font-family:var(--mono); font-size:10px; }
.result-strip.correct { background:#0a1a10; border:1px solid #1a3a22; color:var(--green); }
.result-strip.missed { background:#1a0e10; border:1px solid #3a1a1e; color:var(--red); }
.result-strip .score { font-size:13px; font-weight:700; color:var(--text); }

/* Reeval section */
.reeval { background:linear-gradient(135deg, #141420, #18141e); border:1px solid #2a2838; border-radius:8px; padding:16px 18px; margin:24px 0; }
.reeval h3 { font-family:var(--mono); font-size:9px; letter-spacing:3px; color:var(--orange); margin-bottom:10px; }
.reeval .insight { font-size:14px; color:var(--text2); line-height:1.7; margin-bottom:8px; }
.reeval .power { display:flex; gap:6px; flex-wrap:wrap; margin-top:10px; }
.reeval .power .team { background:var(--surface); border:1px solid var(--border); border-radius:4px; padding:4px 10px; font-family:var(--mono); font-size:10px; }
.reeval .power .team .rank { color:var(--gold); font-weight:700; margin-right:4px; }

/* Summary */
.summary { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:20px; margin-top:32px; text-align:center; }
.summary h3 { font-family:var(--mono); font-size:9px; letter-spacing:3px; color:var(--gold); margin-bottom:12px; }
.summary .big { font-size:36px; font-weight:700; font-family:var(--mono); }
.summary .detail { font-size:12px; color:var(--text2); margin-top:4px; font-family:var(--mono); }

/* Scrollbar */
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

@media (max-width:480px) {
  .header h1 { font-size:24px; }
  .assessment .teams { font-size:16px; }
  .market-compare { flex-direction:column; gap:6px; }
}
</style>
</head>

        "Assessment quality > pick quality. If we had honestly said 'Michigan 40%, Arizona 30%' after the E8, that would have been more valuable than picking Arizona at 58%. The user who took Michigan +3 in the F4 would have been rewarded. The user who took Arizona -3 would have known they were taking the riskier side of a close call.",
        "The product's value is in the assessment honesty, not in the pick record. 45-17 (73%) looks good. But the 50% accuracy in the S16 and F4 — the rounds that matter most — reveals the gap between our stated confidence and our actual calibration. V2 closes that gap by being more honest about uncertainty and more aggressive about updating priors."
      ],
      power: [
        { rank: 1, team: "Michigan", note: "Championship game" },
        { rank: 2, team: "UConn", note: "Championship game" },
      ]
    }
  },
  {
    id: "champ",
    label: "CHAMPIONSHIP",
    title: "National Championship",
    record: "0/1 correct (0%) — Never picked the champion",
    context: "Michigan 69, UConn 63. The Wolverines' tightest game of the tournament — every other win was by 13+ — but they never trailed in the final 10 minutes. Yaxel Lendeborg was named Most Outstanding Player. Dusty May won a national title in his first year at Michigan. UConn's three-peat bid fell 6 points short. Dan Hurley finally lost a Final Four/Championship game.",
    games: [
      { t1: "Michigan", s1: 1, t2: "UConn", s2: 2, ourProb: 42, marketSpread: "UConn -1.5", result: "Michigan 69-63", winner: "Michigan", assessment: "We had Arizona as our champion pick entering the F4. After Arizona lost, we should have immediately pivoted to Michigan — the team that had won every game by 13+. Instead the Championship card showed UConn vs Arizona (our projected final) which was already wrong. Michigan was right there in our analysis the entire tournament. We called them 'the best team in the field' multiple times. We just never made the pick.", value: "upset-value", valueNote: "MICHIGAN +1.5 WAS THE PLAY — five straight 13+ wins, Lendeborg MOP-caliber, best defense in America" },
    ],
    reeval: {
      title: "THE FINAL VERDICT",
      insights: [
        "Michigan won the 2026 NCAA Championship 69-63 over UConn. They won every tournament game by double digits except the final — and still won that comfortably.",
        "MadnessIQ's tournament: 45-18 (71%). Strong at the extremes (LOCK picks: 12/12, SAFE picks: 12/13). Weak in the middle (TOSS-UP: 2/7, 29%). The product added clear value for identifying safe bets and no value for coin-flip games.",
        "The champion was hiding in plain sight. Michigan was in our Final Four from day one. They dominated every round. Lendeborg had the best individual tournament since Anthony Davis. We wrote 'Michigan looks like the best team in the field' after R32, after S16, and after E8. We never made them champion because we were anchored — first to Duke (best player thesis), then to Arizona (betting favorite thesis).",
        "The core lesson for v2: assessments > picks. If we had honestly published '40% Michigan, 30% Arizona, 20% UConn, 10% Illinois' entering the F4, that would have been more valuable than any single pick. The user who saw Michigan at 40% with +1.5 odds would have found massive value. That is the product.",
        "What MadnessIQ got right: early-round accuracy (78% R64, 75% R32), honest bull/bear cases on every game, real-time injury tracking (Foster's return, Jefferson's absence), market data integration, and transparent record-keeping. What it got wrong: re-evaluation speed, upset detection, and the courage to let data override narrative.",
        "The v2 product is not a bracket picker. It is an assessment engine that tells you the honest probability, shows you where the market disagrees, and lets YOU decide what to do with it. 45-18 is a pick record. The real record is: how many times did we identify value the user could act on? That number is higher than 45 — and that is the product."
      ],
      power: [
        { rank: "🏆", team: "Michigan", note: "69-63 — National Champions" },

// Render
const nav = document.getElementById('nav');
const content = document.getElementById('content');

ROUNDS.forEach((r, i) => {
  const btn = document.createElement('button');
  btn.textContent = r.label;
  btn.className = i === 0 ? 'active' : '';
  btn.onclick = () => {
    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.round').forEach(s => s.classList.remove('active'));
    document.getElementById('round-' + r.id).classList.add('active');
  };
  nav.appendChild(btn);
});

ROUNDS.forEach((r, i) => {
  const section = document.createElement('div');
  section.className = 'round' + (i === 0 ? ' active' : '');
  section.id = 'round-' + r.id;

  let html = `
    <div class="round-header">
      <h2>${r.title}</h2>
      <div class="record">${r.record}</div>
      <div class="context">${r.context}</div>
    </div>
  `;

  // Games
  if (r.games) {
    r.games.forEach(g => {
      const favPct = g.ourProb;
      const dogPct = 100 - g.ourProb;
      const isFavT1 = g.ourProb >= 50;
      const fav = isFavT1 ? g.t1 : g.t2;
      const dog = isFavT1 ? g.t2 : g.t1;
      const resultClass = g.winner === fav ? 'correct' : 'missed';
      const resultLabel = g.winner === fav ? 'ASSESSMENT CONSISTENT' : 'UPSET — ASSESSMENT TESTED';

      html += `
        <div class="assessment">
          <div class="matchup">${g.s1}-SEED VS ${g.s2}-SEED</div>
          <div class="teams">
            <span class="seed">(${g.s1})</span> ${g.t1}
            <span class="vs">vs</span>
            <span class="seed">(${g.s2})</span> ${g.t2}
          </div>
          <div class="prob-bar">
            <div class="fav" style="width:${favPct}%">${fav} ${favPct}%</div>
            <div class="dog">${dogPct}% ${dog}</div>
          </div>
          <div class="market-compare">
            <div class="col"><div class="label">OUR ASSESSMENT</div><div class="val green">${fav} ${favPct}%</div></div>
            <div class="col"><div class="label">MARKET LINE</div><div class="val gold">${g.marketSpread}</div></div>
            <div class="col"><div class="label">RESULT</div><div class="val blue">${g.result}</div></div>
          </div>
          <div class="reasoning">${g.assessment}</div>
          <div class="value-tag ${g.value}">${g.valueNote}</div>
          <div class="result-strip ${resultClass}">${resultLabel} — ${g.result}</div>
        </div>
      `;
    });
  }

  // Re-evaluation
  if (r.reeval) {
    html += `<div class="reeval"><h3>${r.reeval.title}</h3>`;
    r.reeval.insights.forEach(ins => {
      html += `<div class="insight">${ins}</div>`;
    });
    if (r.reeval.power) {
      html += `<div class="power">`;
      r.reeval.power.forEach(p => {
        html += `<div class="team"><span class="rank">#${p.rank}</span>${p.team} <span style="color:var(--text3);font-size:8px">${p.note}</span></div>`;
      });
      html += `</div>`;
    }
    html += `</div>`;
  }

  section.innerHTML = html;
  content.appendChild(section);
});
</script>
</body>
</html>
