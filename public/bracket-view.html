<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=0.3, maximum-scale=3.0, user-scalable=yes">
<title>MadnessIQ — Full Bracket</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#08090c;color:#f2ede5;font-family:'DM Mono',monospace;overflow:hidden;height:100vh;width:100vw;touch-action:none}
#wrap{width:100vw;height:100vh;overflow:hidden;position:relative}
#bracket{position:absolute;transform-origin:0 0;width:1200px;height:920px}
.slot{position:absolute;width:105px;height:18px;font-size:7px;display:flex;align-items:center;gap:2px;padding:0 3px;border-radius:2px;cursor:pointer;transition:background 0.1s}
.slot:hover{filter:brightness(1.3)}
.slot .seed{color:#808898;width:14px;text-align:right;flex-shrink:0;font-size:6.5px}
.slot .name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;font-size:7px}
.slot .score{color:#b0b8c8;font-size:7px;flex-shrink:0}
.slot.winner .name{color:#f2ede5;font-weight:700}
.slot.loser{opacity:0.35}
.slot.loser .name{text-decoration:line-through}
.slot.correct{border-left:2px solid #50ff8a}
.slot.wrong{border-left:2px solid #ff6060}
.slot.upset-hit{border-left:2px solid #ffe050}
.slot.pending{border-left:2px solid #3a4058;background:#12141e}
.connector{position:absolute;border-color:#3a4058;border-style:solid;border-width:0}
.region-label{position:absolute;font-size:9px;letter-spacing:3px;font-weight:700}
.ff-label{position:absolute;font-size:8px;letter-spacing:2px;color:#ff9050;font-weight:700}
#header{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(8,9,12,0.92);backdrop-filter:blur(8px);padding:8px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #3a4058}
#header a{text-decoration:none}
#header h1{font-size:14px;font-weight:700;font-family:'DM Mono',monospace}
#header h1 .o{color:#ff9050}
#header .hint{font-size:7px;color:#808898;letter-spacing:1px}
#zoom-controls{position:fixed;bottom:12px;right:12px;z-index:100;display:flex;gap:4px}
#zoom-controls button{width:36px;height:36px;border-radius:50%;border:1px solid #4a5068;background:#1a1e2a;color:#f2ede5;font-size:16px;cursor:pointer}
</style>
</head>
<body>
<div id="header">
  <a href="/"><h1><span class="o">Madness</span>IQ <span style="font-size:8px;color:#808898;margin-left:4px">BRACKET</span></h1></a>
  <span class="hint">PINCH TO ZOOM · TAP MATCHUP FOR DETAIL</span>
</div>
<div id="wrap">
  <div id="bracket"></div>
</div>
<div id="zoom-controls">
  <button id="zout">−</button>
  <button id="zin">+</button>
  <button id="zfit">⊡</button>
</div>
<script>
// ── DATA ──
const TEAMS = {
  EAST:[[1,"Duke"],[16,"Siena"],[8,"Ohio State"],[9,"TCU"],[5,"St. John's"],[12,"N. Iowa"],[4,"Kansas"],[13,"Cal Baptist"],[6,"Louisville"],[11,"S. Florida"],[3,"Michigan St."],[14,"N. Dakota St."],[7,"UCLA"],[10,"UCF"],[2,"UConn"],[15,"Furman"]],
  WEST:[[1,"Arizona"],[16,"Long Island"],[8,"Villanova"],[9,"Utah State"],[5,"Wisconsin"],[12,"High Point"],[4,"Arkansas"],[13,"Hawaii"],[6,"BYU"],[11,"Texas"],[3,"Gonzaga"],[14,"Kennesaw"],[7,"Miami FL"],[10,"Missouri"],[2,"Purdue"],[15,"Queens"]],
  SOUTH:[[1,"Florida"],[16,"Prairie View"],[8,"Clemson"],[9,"Iowa"],[5,"Vanderbilt"],[12,"McNeese"],[4,"Nebraska"],[13,"Troy"],[6,"UNC"],[11,"VCU"],[3,"Illinois"],[14,"Penn"],[7,"St. Mary's"],[10,"Texas A&M"],[2,"Houston"],[15,"Idaho"]],
  MIDWEST:[[1,"Michigan"],[16,"Howard"],[8,"Georgia"],[9,"Saint Louis"],[5,"Texas Tech"],[12,"Akron"],[4,"Alabama"],[13,"Hofstra"],[6,"Tennessee"],[11,"Miami OH"],[3,"Virginia"],[14,"Wright St."],[7,"Kentucky"],[10,"Santa Clara"],[2,"Iowa State"],[15,"Tenn. State"]]
};

// Our picks per round per region
const PICKS = {
  EAST:{R64:["Duke","TCU","St. John's","Kansas","Louisville","Michigan St.","UCLA","UConn"],R32:["Duke","St. John's","Michigan St.","UConn"],S16:["Duke","UConn"],E8:["Duke"]},
  WEST:{R64:["Arizona","Utah State","Wisconsin","Arkansas","BYU","Gonzaga","Miami FL","Purdue"],R32:["Arizona","Arkansas","Gonzaga","Purdue"],S16:["Arizona","Purdue"],E8:["Arizona"]},
  SOUTH:{R64:["Florida","Iowa","Vanderbilt","Nebraska","UNC","Illinois","Texas A&M","Houston"],R32:["Florida","Vanderbilt","Illinois","Houston"],S16:["Florida","Houston"],E8:["Houston"]},
  MIDWEST:{R64:["Michigan","Saint Louis","Texas Tech","Alabama","Tennessee","Virginia","Kentucky","Iowa State"],R32:["Michigan","Alabama","Virginia","Iowa State"],S16:["Michigan","Iowa State"],E8:["Michigan"]}
};
const FF_PICKS = {FF:["Duke","Michigan"],CHAMP:["Duke"]};

// Results
const RESULTS = {
  // R64
  E0:{w:"Duke",s:"71-65"},E1:{w:"TCU",s:"64-66"},E2:{w:"St. John's",s:"79-53"},E3:{w:"Kansas",s:"68-60"},E4:{w:"Louisville",s:"83-79"},E5:{w:"Michigan St.",s:"92-67"},E6:{w:"UCLA",s:"75-71"},E7:{w:"UConn",s:"77-68"},
  W0:{w:"Arizona",s:"92-58"},W1:{w:"Utah State",s:"65-70"},W2:{w:"High Point",s:"82-83"},W3:{w:"Arkansas",s:"97-78"},W4:{w:"Texas",s:"71-79"},W5:{w:"Gonzaga",s:"73-64"},W6:{w:"Miami FL",s:"80-66"},W7:{w:"Purdue",s:"85-60"},
  S0:{w:"Florida",s:"114-55"},S1:{w:"Iowa",s:"61-67"},S2:{w:"Vanderbilt",s:"78-68"},S3:{w:"Nebraska",s:"76-47"},S4:{w:"VCU",s:"78-82"},S5:{w:"Illinois",s:"105-70"},S6:{w:"Texas A&M",s:"50-63"},S7:{w:"Houston",s:"78-47"},
  M0:{w:"Michigan",s:"101-80"},M1:{w:"Saint Louis",s:"77-102"},M2:{w:"Texas Tech",s:"91-71"},M3:{w:"Alabama",s:"87-69"},M4:{w:"Tennessee",s:"75-62"},M5:{w:"Virginia",s:"80-58"},M6:{w:"Kentucky",s:"89-84"},M7:{w:"Iowa State",s:"108-74"},
  // R32
  ER0:{w:"Duke",s:"81-58"},ER1:{w:"St. John's",s:"67-65"},ER2:{w:"Michigan St.",s:"77-69"},
  WR1:{w:"Arkansas",s:"94-88"},WR2:{w:"Texas",s:"74-68"},WR3:{w:"Purdue",s:"79-69"},
  SR1:{w:"Nebraska",s:"74-72"},SR2:{w:"Illinois",s:"76-55"},SR3:{w:"Houston",s:"88-57"},
  MR0:{w:"Michigan",s:"95-72"},MR2:{w:"Tennessee",s:"79-72"},MR3:{w:"Iowa State",s:"82-63"},
};

const REGION_COLORS = {EAST:"#5090ff",WEST:"#ff7855",SOUTH:"#60ff90",MIDWEST:"#ffe050"};
const R_PREFIX = {EAST:"E",WEST:"W",SOUTH:"S",MIDWEST:"M"};
const ROUNDS = ["R64","R32","S16","E8"];

function getResultId(region, round, idx) {
  const p = R_PREFIX[region];
  if (round === "R64") return p + idx;
  if (round === "R32") return p + "R" + idx;
  if (round === "S16") return p + "S" + idx;
  if (round === "E8") return p + "E";
  return null;
}

function getWinner(region, round, idx) {
  const rid = getResultId(region, round, idx);
  return rid && RESULTS[rid] ? RESULTS[rid].w : null;
}

function getScore(region, round, idx) {
  const rid = getResultId(region, round, idx);
  return rid && RESULTS[rid] ? RESULTS[rid].s : null;
}

function getTeamsForMatchup(region, round, idx) {
  const teams = TEAMS[region];
  if (round === "R64") return [teams[idx*2], teams[idx*2+1]];
  const w0 = getWinner(region, ROUNDS[ROUNDS.indexOf(round)-1], idx*2);
  const w1 = getWinner(region, ROUNDS[ROUNDS.indexOf(round)-1], idx*2+1);
  const findSeed = (n) => { const t = teams.find(x=>x[1]===n); return t ? t[0] : "?"; };
  return [w0 ? [findSeed(w0), w0] : null, w1 ? [findSeed(w1), w1] : null];
}

// ── RENDER ──
const bracket = document.getElementById("bracket");
const COL_W = 115, SLOT_H = 18, GAP = 2, MATCH_H = SLOT_H*2+GAP;
const REGION_H = 8 * (MATCH_H + 10); // 8 matchups with spacing
const TOP_PAD = 44;

function makeSlot(x, y, seed, name, score, isWinner, isLoser, pickStatus) {
  const d = document.createElement("div");
  d.className = "slot" + (isWinner?" winner":"") + (isLoser?" loser":"") + (pickStatus?" "+pickStatus:"");
  d.style.left = x+"px"; d.style.top = y+"px";
  const bg = isWinner ? "#1a1e2a" : "#0e1014";
  d.style.background = bg;
  d.innerHTML = `<span class="seed">${seed||""}</span><span class="name">${name||"TBD"}</span>${score?`<span class="score">${score}</span>`:""}`;
  return d;
}

function drawConnector(x1,y1,x2,y2,dir) {
  // Horizontal then vertical then horizontal
  const c = document.createElement("div");
  c.className = "connector";
  if (dir === "right") {
    const midX = x1 + (x2-x1)/2;
    // Horizontal from x1 to midX at y1
    const h1 = document.createElement("div"); h1.className="connector";
    h1.style.cssText = `position:absolute;left:${x1}px;top:${y1}px;width:${midX-x1}px;border-top-width:1px`;
    bracket.appendChild(h1);
    // Vertical from y1 to y2 at midX
    const v = document.createElement("div"); v.className="connector";
    const minY = Math.min(y1,y2), maxY = Math.max(y1,y2);
    v.style.cssText = `position:absolute;left:${midX}px;top:${minY}px;height:${maxY-minY}px;border-left-width:1px`;
    bracket.appendChild(v);
    // Horizontal from midX to x2 at y2
    const h2 = document.createElement("div"); h2.className="connector";
    h2.style.cssText = `position:absolute;left:${midX}px;top:${y2}px;width:${x2-midX}px;border-top-width:1px`;
    bracket.appendChild(h2);
  } else {
    const midX = x2 + (x1-x2)/2;
    const h1 = document.createElement("div"); h1.className="connector";
    h1.style.cssText = `position:absolute;left:${midX}px;top:${y1}px;width:${x1-midX}px;border-top-width:1px`;
    bracket.appendChild(h1);
    const v = document.createElement("div"); v.className="connector";
    const minY = Math.min(y1,y2), maxY = Math.max(y1,y2);
    v.style.cssText = `position:absolute;left:${midX}px;top:${minY}px;height:${maxY-minY}px;border-left-width:1px`;
    bracket.appendChild(v);
    const h2 = document.createElement("div"); h2.className="connector";
    h2.style.cssText = `position:absolute;left:${midX}px;top:${y2}px;width:${midX-x2}px;border-top-width:1px`;
    bracket.appendChild(h2);
  }
}

function renderRegion(region, baseX, baseY, direction) {
  const regionPicks = PICKS[region];
  const positions = {}; // track center Y of each matchup for connectors

  ROUNDS.forEach((round, rIdx) => {
    const numMatchups = 8 / Math.pow(2, rIdx);
    const spacing = REGION_H / numMatchups;
    const colX = direction === "right" ? baseX + rIdx * COL_W : baseX - rIdx * COL_W;

    for (let i = 0; i < numMatchups; i++) {
      const teams = getTeamsForMatchup(region, round, i);
      const winner = getWinner(region, round, i);
      const score = getScore(region, round, i);
      const pick = regionPicks[round] ? regionPicks[round][i] : null;

      const matchY = baseY + spacing * i + spacing/2 - MATCH_H/2;
      const centerY = matchY + MATCH_H/2;
      const key = `${round}-${i}`;
      positions[key] = { x: direction==="right" ? colX+COL_W : colX, y: centerY };

      // Parse scores
      let s1="", s2="";
      if (score) { const parts = score.split("-"); s1 = parts[0]; s2 = parts[1]; }

      for (let ti = 0; ti < 2; ti++) {
        const team = teams[ti];
        const y = matchY + ti * (SLOT_H + GAP);
        if (!team) {
          bracket.appendChild(makeSlot(colX, y, "", "TBD", "", false, false, "pending"));
          continue;
        }
        const [seed, name] = team;
        const isWinner = winner === name;
        const isLoser = winner && !isWinner;
        const teamScore = ti === 0 ? s1 : s2;

        let pickStatus = "";
        if (pick && winner) {
          if (pick === name && isWinner) pickStatus = "correct";
          else if (pick === name && isLoser) pickStatus = "wrong";
          // Check if pick was an upset call
          if (pickStatus === "correct" && seed >= 8) pickStatus = "upset-hit";
        } else if (!winner) {
          pickStatus = "pending";
        }

        const slot = makeSlot(colX, y, seed, name, teamScore, isWinner, isLoser, pickStatus);
        slot.onclick = () => {
          const roundMap = {R64:"R64",R32:"R32",S16:"S16",E8:"E8"};
          window.location.href = `/?region=${region}&round=${roundMap[round]}`;
        };
        bracket.appendChild(slot);
      }

      // Draw connectors to next round
      if (rIdx < ROUNDS.length - 1) {
        const nextKey = `${ROUNDS[rIdx+1]}-${Math.floor(i/2)}`;
        if (i % 2 === 1 && positions[key] && positions[`${round}-${i-1}`]) {
          // Connect this matchup and its pair to next round
          // We'll draw connectors after all positions are set
        }
      }
    }
  });

  // Draw connectors between rounds
  ROUNDS.forEach((round, rIdx) => {
    if (rIdx >= ROUNDS.length - 1) return;
    const nextRound = ROUNDS[rIdx + 1];
    const numMatchups = 8 / Math.pow(2, rIdx);
    for (let i = 0; i < numMatchups; i += 2) {
      const p1 = positions[`${round}-${i}`];
      const p2 = positions[`${round}-${i+1}`];
      const pNext = positions[`${nextRound}-${Math.floor(i/2)}`];
      if (p1 && p2 && pNext) {
        if (direction === "right") {
          drawConnector(p1.x, p1.y, pNext.x - COL_W, pNext.y, "right");
          drawConnector(p2.x, p2.y, pNext.x - COL_W, pNext.y, "right");
        } else {
          drawConnector(p1.x, p1.y, pNext.x + COL_W, pNext.y, "left");
          drawConnector(p2.x, p2.y, pNext.x + COL_W, pNext.y, "left");
        }
      }
    }
  });

  // Region label
  const lbl = document.createElement("div");
  lbl.className = "region-label";
  lbl.style.color = REGION_COLORS[region];
  lbl.style.left = (direction==="right" ? baseX : baseX - 3*COL_W) + "px";
  lbl.style.top = (baseY - 16) + "px";
  lbl.textContent = region;
  bracket.appendChild(lbl);

  return positions;
}

// Layout: EAST top-left, SOUTH bottom-left, WEST top-right (reversed), MIDWEST bottom-right (reversed)
const LEFT_X = 10;
const RIGHT_X = 1090;
const HALF_H = REGION_H / 2 + 20;

const eastPos = renderRegion("EAST", LEFT_X, TOP_PAD, "right");
const southPos = renderRegion("SOUTH", LEFT_X, TOP_PAD + HALF_H + 40, "right");
const westPos = renderRegion("WEST", RIGHT_X, TOP_PAD, "left");
const midwestPos = renderRegion("MIDWEST", RIGHT_X, TOP_PAD + HALF_H + 40, "left");

// Final Four
const FF_X = 520, FF_Y_1 = TOP_PAD + HALF_H/2, FF_Y_2 = TOP_PAD + HALF_H + 40 + HALF_H/2;
const CHAMP_Y = (FF_Y_1 + FF_Y_2) / 2;

// FF label
const ffLbl = document.createElement("div");
ffLbl.className = "ff-label";
ffLbl.style.left = FF_X + "px"; ffLbl.style.top = (FF_Y_1 - 24) + "px";
ffLbl.textContent = "FINAL FOUR";
bracket.appendChild(ffLbl);

// Championship label  
const cLbl = document.createElement("div");
cLbl.className = "ff-label";
cLbl.style.left = (FF_X + 30) + "px"; cLbl.style.top = (CHAMP_Y - 36) + "px";
cLbl.style.color = "#ffe050";
cLbl.textContent = "CHAMPIONSHIP";
bracket.appendChild(cLbl);

// FF Semifinal 1: EAST champ vs SOUTH champ
// FF Semifinal 2: WEST champ vs MIDWEST champ
// Championship: FF1 winner vs FF2 winner
// These are mostly pending — render placeholder slots

const eastChamp = getWinner("EAST","E8",0);
const southChamp = getWinner("SOUTH","E8",0);
const westChamp = getWinner("WEST","E8",0);
const midwestChamp = getWinner("MIDWEST","E8",0);

function renderFFSlot(x, y, name, seed) {
  const slot = makeSlot(x, y, seed||"", name||"TBD", "", false, false, name?"pending":"pending");
  bracket.appendChild(slot);
}

renderFFSlot(FF_X, FF_Y_1 - SLOT_H - 1, eastChamp, ""); 
renderFFSlot(FF_X, FF_Y_1 + 1, southChamp, "");
renderFFSlot(FF_X, FF_Y_2 - SLOT_H - 1, westChamp, "");
renderFFSlot(FF_X, FF_Y_2 + 1, midwestChamp, "");

// Championship slots
renderFFSlot(FF_X + 20, CHAMP_Y - SLOT_H - 1, null, "");
renderFFSlot(FF_X + 20, CHAMP_Y + 1, null, "");

// ── ZOOM / PAN ──
let scale = 1, tx = 0, ty = 0;
const el = document.getElementById("bracket");
const wrap = document.getElementById("wrap");

function fitToScreen() {
  const sw = window.innerWidth, sh = window.innerHeight - 40;
  const bw = 1200, bh = 920;
  scale = Math.min(sw/bw, sh/bh) * 0.95;
  tx = (sw - bw*scale)/2;
  ty = 40;
  applyTransform();
}

function applyTransform() {
  el.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
}

fitToScreen();

// Pinch zoom
let startDist = 0, startScale = 1;
let startTx, startTy, startMidX, startMidY;
let isDragging = false, dragStartX, dragStartY;

wrap.addEventListener("touchstart", e => {
  if (e.touches.length === 2) {
    e.preventDefault();
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    startDist = Math.sqrt(dx*dx+dy*dy);
    startScale = scale;
    startMidX = (e.touches[0].clientX+e.touches[1].clientX)/2;
    startMidY = (e.touches[0].clientY+e.touches[1].clientY)/2;
    startTx = tx; startTy = ty;
  } else if (e.touches.length === 1) {
    isDragging = true;
    dragStartX = e.touches[0].clientX - tx;
    dragStartY = e.touches[0].clientY - ty;
  }
}, {passive:false});

wrap.addEventListener("touchmove", e => {
  if (e.touches.length === 2) {
    e.preventDefault();
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx+dy*dy);
    const newScale = Math.max(0.3, Math.min(3, startScale * (dist/startDist)));
    const midX = (e.touches[0].clientX+e.touches[1].clientX)/2;
    const midY = (e.touches[0].clientY+e.touches[1].clientY)/2;
    tx = startTx + (midX - startMidX) + (startMidX - startTx) * (1 - newScale/startScale);
    ty = startTy + (midY - startMidY) + (startMidY - startTy) * (1 - newScale/startScale);
    scale = newScale;
    applyTransform();
  } else if (e.touches.length === 1 && isDragging) {
    tx = e.touches[0].clientX - dragStartX;
    ty = e.touches[0].clientY - dragStartY;
    applyTransform();
  }
}, {passive:false});

wrap.addEventListener("touchend", () => { isDragging = false; });

// Mouse wheel zoom
wrap.addEventListener("wheel", e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  const newScale = Math.max(0.3, Math.min(3, scale * delta));
  const rect = wrap.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  tx = mx - (mx - tx) * (newScale/scale);
  ty = my - (my - ty) * (newScale/scale);
  scale = newScale;
  applyTransform();
}, {passive:false});

// Buttons
document.getElementById("zin").onclick = () => { scale = Math.min(3, scale*1.3); applyTransform(); };
document.getElementById("zout").onclick = () => { scale = Math.max(0.3, scale*0.7); applyTransform(); };
document.getElementById("zfit").onclick = fitToScreen;

window.addEventListener("resize", fitToScreen);
</script>
</body>
</html>
